name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
      - name: ruff
        run: ruff check src tests
      - name: mypy
        run: mypy src
